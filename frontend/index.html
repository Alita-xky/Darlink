<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>Darlink MVP</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body{font-family: Arial, Helvetica, sans-serif;max-width:800px;margin:20px auto;padding:10px}
    .hidden{display:none}
    .persona{border:1px solid #ddd;padding:8px;margin:6px;display:inline-block;width:150px}
    #chat{border:1px solid #ccc;height:300px;overflow:auto;padding:8px}
  </style>
</head>
<body>
  <h1>Darlink - 校园交友 MVP</h1>

  <div id="step-email">
    <p>请输入学校邮箱完成验证（示例：you@university.edu 或 .edu.cn）</p>
    <input id="email" placeholder="your@school.edu" />
    <button id="verify">验证并创建账号</button>
    <p id="ver-result"></p>
  </div>

  <div id="step-persona" class="hidden">
    <h3>选择一个人物机器人开始聊天</h3>
    <p>这里有 13 个人物机器人，选中谁就用谁的说话风格。</p>
    <div id="personas"></div>
    <hr />
    <h4>当前人物</h4>
    <p id="persona-status">未选择</p>
  </div>

  <div id="step-chat" class="hidden">
    <h3>聊天</h3>
    <div id="chat"></div>
    <input id="msg" placeholder="说点什么..." style="width:70%" />
    <button id="send">发送</button>
  </div>

  <div id="step-profile" class="hidden">
    <h3>个人档案（用于数字人蒸馏 / RAG）</h3>
    <textarea id="profile_text" placeholder="写一些关于你的简介、兴趣、表达风格..." style="width:100%;height:100px"></textarea>
    <button id="upload_profile">上传 profile</button>
    <p id="profile_result"></p>
  </div>

<script>
let debug_token = null;
let user_token = null;
let session_id = null;
let persona_id = null;
let persona_name = null;

async function postJson(url, body){
  const r = await fetch(url, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
  return r.json();
}

document.getElementById('verify').onclick = async ()=>{
  const email = document.getElementById('email').value;
  // send verification (dev returns debug_token)
  const r = await postJson('/verify_email/send', {email});
  if(!r.ok){
    document.getElementById('ver-result').innerText = '发送失败：'+JSON.stringify(r);
    return;
  }
  debug_token = r.debug_token;
  // auto-confirm using debug_token to get user_token (dev flow)
  const c = await postJson('/verify_email/confirm', {token: debug_token});
  if(!c.ok){
    document.getElementById('ver-result').innerText = '确认失败：'+JSON.stringify(c);
    return;
  }
  user_token = c.user_token;
  document.getElementById('step-email').classList.add('hidden');
  document.getElementById('step-persona').classList.remove('hidden');
  document.getElementById('step-profile').classList.remove('hidden');
  loadPersonas();
}

function updatePersonaStatus(){
  const status = document.getElementById('persona-status');
  if(persona_name){
    status.innerText = `已选择：${persona_name}`;
  }else{
    status.innerText = '未选择';
  }
}

async function loadPersonas(){
  const r = await fetch('/personas');
  const data = await r.json();
  const box = document.getElementById('personas');
  box.innerHTML='';
  data.personas.forEach(p=>{
    const el = document.createElement('div');
    el.className='persona';
    el.innerHTML = `<strong>${p.name}</strong><div>${p.desc}</div><button data-id="${p.id}">开始聊天</button>`;
    box.appendChild(el);
    el.querySelector('button').onclick = ()=>selectPersona(p.id, p.name);
  });
}

async function selectPersona(id, name){
  persona_id = id;
  persona_name = name;
  updatePersonaStatus();
  const r = await postJson('/chat/start', {user_token, persona_id: id});
  if(r.ok){
    session_id = r.session_id;
    document.getElementById('step-persona').classList.add('hidden');
    document.getElementById('step-chat').classList.remove('hidden');
    addChat('system',`已创建会话：${name}`);
  }else{
    addChat('system','创建会话失败: '+(r.reason||JSON.stringify(r)));
  }
}

function addChat(who, text){
  const c = document.getElementById('chat');
  const d = document.createElement('div');
  d.innerHTML = `<b>${who}</b>: ${text}`;
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}

document.getElementById('send').onclick = async ()=>{
  const text = document.getElementById('msg').value;
  if(!session_id) return;
  addChat('you', text);
  document.getElementById('msg').value='';
  const r = await postJson('/chat/message', {session_id, text});
  if(r.ok){
    addChat('bot', r.reply);
  }else{
    addChat('system','错误: '+(r.reason||JSON.stringify(r)));
  }
}

document.getElementById('upload_profile').onclick = async ()=>{
  const text = document.getElementById('profile_text').value;
  if(!user_token){
    document.getElementById('profile_result').innerText = '未登录';
    return;
  }
  const r = await postJson('/user/profile', {user_token, profile_text: text});
  if(r.ok){
    document.getElementById('profile_result').innerText = '上传成功';
  }else{
    document.getElementById('profile_result').innerText = '上传失败: '+JSON.stringify(r);
  }
}
</script>
</body>
</html>
