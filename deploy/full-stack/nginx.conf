# Darlink 反代：80 端口分发
# /            → FastAPI（含静态前端）
# /dashboard/  → Streamlit（路径前缀 + websocket）

upstream darlink_api {
    server api:8000;
}
upstream darlink_dashboard {
    server dashboard:8501;
}

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 20M;
    proxy_read_timeout 600s;

    # 主站：FastAPI
    location / {
        proxy_pass http://darlink_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 数据看板：注意需要 strip /dashboard/ 前缀，并处理 websocket
    location /dashboard/ {
        rewrite ^/dashboard/(.*)$ /$1 break;
        proxy_pass http://darlink_dashboard;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Streamlit 静态资源（_stcore）需要直通
    location /_stcore/ {
        proxy_pass http://darlink_dashboard;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
