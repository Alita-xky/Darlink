# 放到 /etc/logrotate.d/darlink
# 每周轮转，保留 8 周；空文件不轮转；轮转后压缩
/opt/darlink/scripts/logs/*.log /opt/darlink/scripts/logs/*.err {
    weekly
    rotate 8
    compress
    delaycompress
    missingok
    notifempty
    create 0640 darlink darlink
    sharedscripts
    postrotate
        # 如果 dashboard 服务在跑，可在这里 reload；当前用 systemd 自管，留空即可
        true
    endscript
}
